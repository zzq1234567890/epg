name: Extract M3U8 from YouTube Playlist

on:
  push:
    paths:
      - 'youtube.txt'
    branches: [ main ]
  workflow_dispatch:  # 允許手動觸發
  schedule:
    - cron: '0 */6 * * *'  # 每6小時運行一次

jobs:
  extract-m3u8:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install yt-dlp
      run: |
        pip install yt-dlp
        pip install --upgrade yt-dlp

    - name: Extract M3U8 links
      id: extract
      run: |
        # 創建輸出目錄
        mkdir -p temp_m3u8
        
        # 讀取原始文件
        if [ -f youtube.m3u8 ]; then
          echo "📋 讀取原始播放列表..."
          
          # 提取 YouTube 視頻ID
          grep -o 'v=[a-zA-Z0-9_-]\+' youtube.m3u8 | cut -d'=' -f2 > video_ids.txt
          
          # 初始化新M3U8文件
          echo "#EXTM3U" > yt.m3u8
          
          # 統計變量
          total_count=$(wc -l < video_ids.txt)
          success_count=0
          fail_count=0
          
          echo "🔍 找到 $total_count 個視頻"
          
          # 處理每個視頻
          i=1
          while IFS= read -r video_id; do
            echo "⏳ 處理第 $i/$total_count 個視頻: $video_id"
            
            # 獲取視頻信息
            video_url="https://www.youtube.com/watch?v=$video_id"
            
            # 從原始文件中提取對應的信息行
            original_line=$(grep -m1 "v=$video_id" youtube.txt)
            
            # 嘗試提取M3U8鏈接
            if yt-dlp -g -f "best" "$video_url" > temp_m3u8/$video_id.m3u8 2>/dev/null; then
              m3u8_url=$(cat temp_m3u8/$video_id.m3u8 | head -1)
              
              if [ ! -z "$m3u8_url" ] && [ "$m3u8_url" != "" ]; then
                # 修改原始行，替換URL為M3U8鏈接
                new_line="${original_line//youtube.com\/watch?v=$video_id/$m3u8_url}"
                echo "$new_line" >> yt.m3u8
                ((success_count++))
                echo "✅ 成功提取: $video_id"
              else
                echo "❌ 無法提取M3U8鏈接: $video_id"
                echo "$original_line" >> yt.m3u8  # 保留原始鏈接
                ((fail_count++))
              fi
            else
              echo "❌ yt-dlp失敗: $video_id"
              echo "$original_line" >> yt.m3u8  # 保留原始鏈接
              ((fail_count++))
            fi
            
            ((i++))
            sleep 1  # 避免請求過快
            
          done < video_ids.txt
          
          echo "📊 統計結果:"
          echo "總數: $total_count"
          echo "成功: $success_count"
          echo "失敗: $fail_count"
          
          # 清理臨時文件
          rm -rf temp_m3u8 video_ids.txt
          
        else
          echo "❌ 找不到 youtube.txt 文件"
          exit 1
        fi

    - name: Commit and push if changes
      run: |
        # 配置git
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # 檢查是否有變更
        if git diff --quiet yt.m3u8; then
          echo "⚠️ 沒有變更需要提交"
        else
          echo "📤 提交變更..."
          
          # 添加並提交文件
          git add yt.m3u8
          git commit -m "🔄 更新 M3U8 播放列表 [$(date +'%Y-%m-%d %H:%M:%S')]
          
          自動更新 YouTube M3U8 播放列表"
          
          # 推送變更
          git push origin main
          
          echo "✅ 成功更新播放列表"
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: yt-m3u8-playlist
        path: yt.m3u8
        retention-days: 5
