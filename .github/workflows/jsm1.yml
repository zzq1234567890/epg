name: 提取電視台名稱和生成分析報告統計表測試
on:
  schedule:
    - cron: '8 */1 * * *'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download XML files
        run: |
          curl -L --retry 3 --max-time 10 -o twepg.xml https://raw.githubusercontent.com/zzq1234567890/epg/main/twepg.xml
          curl -L --retry 3 --max-time 10 -o swepg.xml https://raw.githubusercontent.com/zzq1234567890/epg/main/swepg.xml
          [ -s twepg.xml ] || { echo "twepg.xml 為空"; exit 1; }
          [ -s swepg.xml ] || { echo "swepg.xml 為空"; exit 1; }

      - name: Extract channel names, analyze, and update README
        run: |
          python <<'EOF'
          import xml.etree.ElementTree as ET
          import json
          from datetime import datetime
          import re
          import os

          def analyze_epg_data(xml_file):
              try:
                  tree = ET.parse(xml_file)
                  root = tree.getroot()
                  # 獲取 XML 文件的最後修改時間（即下載時間）
                  file_mtime = datetime.fromtimestamp(os.path.getmtime(xml_file)).strftime('%Y-%m-%d %H:%M')
                  
                  ns = {'ns': root.tag.split('}')[0][1:]} if root.tag.startswith('{') else {}
                  channels_info = {}
                  original_order_ids = []
                  
                  channel_xpath = 'ns:channel' if ns else 'channel'
                  for channel in root.findall(channel_xpath, ns):
                      channel_id = channel.get('id')
                      if not channel_id: continue
                      if channel_id not in channels_info:
                          original_order_ids.append(channel_id)
                
                      name_elem = channel.find('ns:display-name' if ns else 'display-name', ns)
                      name = name_elem.text.strip() if name_elem is not None and name_elem.text else channel_id
                      
                      channels_info[channel_id] = {
                          'name': name,
                          'program_count': 0,
                          'start_times': [],
                          'end_times': []
                      }

                  programme_xpath = 'ns:programme' if ns else 'programme'
                  for programme in root.findall(programme_xpath, ns):
                      channel_id = programme.get('channel')
                      if channel_id not in channels_info: continue
                      
                      channels_info[channel_id]['program_count'] += 1
                      start, stop = programme.get('start'), programme.get('stop')
                      if start:
                          s_match = re.search(r'\d{14}', start)
                          if s_match: channels_info[channel_id]['start_times'].append(s_match.group())
                      if stop:
                          e_match = re.search(r'\d{14}', stop)
                          if e_match: channels_info[channel_id]['end_times'].append(e_match.group())

                  result = []
                  for channel_id in original_order_ids:
                      info = channels_info[channel_id]
                      time_range, duration_days, epg_status = "無數據", 0, "□"
                      
                      if info['start_times'] and info['end_times']:
                          try:
                              start_dt = datetime.strptime(min(info['start_times']), '%Y%m%d%H%M%S')
                              end_dt = datetime.strptime(max(info['end_times']), '%Y%m%d%H%M%S')
                              delta = end_dt - start_dt
                              duration_days = delta.days + (1 if delta.seconds > 3600 else 0)
                              time_range = f"{start_dt.strftime('%m-%d %H:%M')} ~ {end_dt.strftime('%m-%d %H:%M')}"
                          except: time_range = "格式異常"

                      if info['program_count'] > 0: epg_status = "■"

                      result.append({
                          'channel_id': channel_id,
                          'channel_name': info['name'],
                          'program_count': info['program_count'],
                          'duration_days': duration_days,
                          'time_range': time_range,
                          'epg_status': epg_status,
                          'file_mtime': file_mtime
                      })
                  return result
              except Exception as e:
                  print(f"❌ 解析失敗: {e}")
                  return []

          tw_data = analyze_epg_data('twepg.xml')
          sw_data = analyze_epg_data('swepg.xml')

          def generate_readme():
              content = "# 📺 EPG 電子節目表狀態報告\n\n"
              # 使用 XML 文件實際下載的時間作為標題
              tw_time = tw_data[0]['file_mtime'] if tw_data else "未知"
              sw_time = sw_data[0]['file_mtime'] if sw_data else "未知"
              
              content += f"> 🔄 數據來源更新時間：\n"
              content += f"> - 繁體 (twepg): **{tw_time}**\n"
              content += f"> - 簡體 (swepg): **{sw_time}**\n\n"

              for title, data in [("🇹🇼 繁體頻道列表", tw_data), ("🇨🇳 簡體頻道列表", sw_data)]:
                  content += f"## {title}\n\n| 頻道名稱 | 節目數量 | 覆蓋天數 | 時間範圍 | 狀態 |\n| :--- | :---: | :---: | :--- | :---: |\n"
                  for item in data:
                      status = "✅" if item['epg_status'] == "■" else "⚠️"
                      content += f"| {item['channel_name']} | {item['program_count']} | {item['duration_days']} 天 | {item['time_range']} | {status} |\n"
                  content += "\n"
              
              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(content)

          generate_readme()
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update EPG status based on file upload time" || exit 0
          git pull --rebase && git push
