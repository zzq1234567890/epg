name: Generate Video Stream Source

on:
  workflow_dispatch:  # 手动触发
  push:
    paths:
      - 'videos.txt'  # 当 videos.txt 文件变更时触发
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动运行一次

jobs:
  generate-stream:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install yt-dlp
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp
        pip install requests

    - name: Parse YouTube video and generate stream source
      env:
        VIDEO_URL: "https://m.youtube.com/watch?v=fN9uYWCjQaw"
      run: |
        # 创建输出目录
        mkdir -p output
        
        echo "正在解析视频: $VIDEO_URL"
        
        # 方法1: 直接获取视频流信息并生成播放列表
        echo "#EXTM3U" > output/playlist.m3u
        echo "#EXTINF:-1, YouTube Video" >> output/playlist.m3u
        
        # 获取最佳视频流URL
        STREAM_URL=$(yt-dlp -g -f best "$VIDEO_URL" 2>/dev/null | head -1)
        
        if [ -n "$STREAM_URL" ]; then
          echo "$STREAM_URL" >> output/playlist.m3u
          echo "✓ 成功生成播放列表"
          echo "Stream URL: $STREAM_URL"
        else
          echo "✗ 无法获取视频流"
          exit 1
        fi
        
        # 方法2: 生成更详细的JSON信息
        echo "正在获取视频详细信息..."
        yt-dlp --dump-json "$VIDEO_URL" > output/video_info.json
        
        # 方法3: 生成多格式播放列表
        echo "#EXTM3U" > output/multi_quality.m3u
        echo "# Generated by yt-dlp on $(date)" >> output/multi_quality.m3u
        
        # 获取不同质量的流
        yt-dlp -F "$VIDEO_URL" | grep -E "^(webm|mp4)" | while read line; do
          FORMAT_ID=$(echo $line | awk '{print $1}')
          RESOLUTION=$(echo $line | awk '{print $6}')
          FORMAT_INFO=$(echo $line | awk '{print $3, $4, $5, $6, $7, $8, $9}')
          
          if [[ "$FORMAT_ID" =~ ^[0-9]+$ ]]; then
            STREAM_URL=$(yt-dlp -g -f $FORMAT_ID "$VIDEO_URL" 2>/dev/null)
            if [ -n "$STREAM_URL" ]; then
              echo "#EXTINF:-1, $FORMAT_INFO" >> output/multi_quality.m3u
              echo "$STREAM_URL" >> output/multi_quality.m3u
            fi
          fi
        done

    - name: Create README with stream information
      run: |
        cat > output/README.md << 'EOF'
        # 视频流源文件
        
        ## 已解析的视频
        - URL: https://m.youtube.com/watch?v=fN9uYWCjQaw
        - 生成时间: $(date)
        
        ## 包含的文件
        
        1. **playlist.m3u** - 包含最佳质量的视频流
        2. **multi_quality.m3u** - 包含多种质量的视频流
        3. **video_info.json** - 视频的完整元数据
        
        ## 使用方法
        
        ### 直接播放
        使用支持 M3U 的播放器（如 VLC, PotPlayer 等）打开 playlist.m3u
        
        ### 嵌入到其他应用
        ```html
        <!-- HTML5 视频播放 -->
        <video controls>
          <source src="[STREAM_URL]" type="video/mp4">
        </video>
        ```
        
        ### 命令行播放
        ```bash
        # 使用 ffplay
        ffplay -i "$(cat playlist.m3u | tail -1)"
        ```
        EOF

    - name: Upload generated files as artifact
      uses: actions/upload-artifact@v3
      with:
        name: video-stream-sources
        path: output/
        retention-days: 7

    - name: Display stream information
      run: |
        echo "=== 视频流信息 ==="
        echo "播放列表已生成: playlist.m3u"
        echo "多质量列表: multi_quality.m3u"
        echo "视频信息: video_info.json"
        echo ""
        echo "最新的视频流URL:"
        tail -1 output/playlist.m3u
