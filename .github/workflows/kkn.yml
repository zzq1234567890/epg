name: Generate Video Stream Source

on:
  workflow_dispatch:  # 手动触发
  push:
    paths:
      - 'videos.txt'  # 当 videos.txt 文件变更时触发
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动运行一次

jobs:
  generate-stream:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp ffmpeg-python
        sudo apt-get update
        sudo apt-get install -y ffmpeg jq

    - name: Convert cookies format
      id: convert-cookies
      run: |
        echo "检查cookies.txt文件..."
        if [ ! -f "cookies.txt" ]; then
          echo "错误: cookies.txt 文件不存在!"
          exit 1
        fi
        
        echo "原始cookies.txt内容预览:"
        head -3 cookies.txt
        
        echo "转换cookies格式为Netscape格式..."
        
        # 提取Cookie字符串
        COOKIE_STRING=$(grep -i "cookie:" cookies.txt | sed 's/Cookie:\s*//i')
        
        if [ -z "$COOKIE_STRING" ]; then
          echo "错误: 无法从cookies.txt中提取Cookie字符串"
          echo "尝试使用文件内容作为Cookie字符串..."
          COOKIE_STRING=$(cat cookies.txt | tr -d '\n' | tr -d '\r')
        fi
        
        echo "提取的Cookie字符串长度: ${#COOKIE_STRING}"
        
        # 创建Netscape格式的cookies文件
        echo "# Netscape HTTP Cookie File" > cookies_netscape.txt
        echo "# This file was generated by GitHub Actions" >> cookies_netscape.txt
        echo "# Domain is set to .youtube.com for YouTube cookies" >> cookies_netscape.txt
        
        # 设置当前时间戳（秒）
        CURRENT_TIME=$(date +%s)
        # 设置过期时间为1天后
        EXPIRY_TIME=$((CURRENT_TIME + 86400))
        
        # 将Cookie字符串拆分为单独的cookie
        echo "$COOKIE_STRING" | sed 's/; /\n/g' | while IFS= read -r cookie_pair; do
          # 跳过空行
          [ -z "$cookie_pair" ] && continue
          
          # 提取cookie名称和值
          COOKIE_NAME=$(echo "$cookie_pair" | cut -d'=' -f1)
          COOKIE_VALUE=$(echo "$cookie_pair" | cut -d'=' -f2-)
          
          # 处理URL编码的值
          COOKIE_VALUE=$(echo "$COOKIE_VALUE" | sed 's/%3D/=/g; s/%3B/;/g')
          
          # 写入Netscape格式
          # 格式: domain flag path secure expiration name value
          echo ".youtube.com	TRUE	/	TRUE	$EXPIRY_TIME	$COOKIE_NAME	$COOKIE_VALUE" >> cookies_netscape.txt
        done
        
        echo "转换完成！Netscape格式cookies预览:"
        head -5 cookies_netscape.txt
        
        # 检查是否成功创建了cookies
        COOKIE_COUNT=$(wc -l < cookies_netscape.txt)
        if [ "$COOKIE_COUNT" -lt 4 ]; then
          echo "错误: 转换后的cookies文件行数太少 ($COOKIE_COUNT 行)"
          echo "尝试备用转换方法..."
          
          # 备用方法：直接创建简单的cookie文件
          echo ".youtube.com	TRUE	/	TRUE	$EXPIRY_TIME	COOKIE_HEADER	$COOKIE_STRING" > cookies_netscape.txt
        fi
        
        echo "最终cookies文件内容:"
        cat cookies_netscape.txt

    - name: Parse YouTube video
      id: parse-video
      env:
        VIDEO_URL: "https://m.youtube.com/watch?v=fN9uYWCjQaw"
      run: |
        # 创建输出目录
        mkdir -p output
        
        echo "正在解析视频: $VIDEO_URL"
        echo "开始时间: $(date)"
        
        # 检查cookies文件
        if [ ! -f "cookies_netscape.txt" ]; then
          echo "错误: cookies_netscape.txt 文件不存在!"
          exit 1
        fi
        
        echo "使用转换后的cookies文件..."
        ls -la cookies_netscape.txt
        
        # 测试cookies是否有效
        echo "测试cookies是否有效..."
        yt-dlp --cookies cookies_netscape.txt --version
        
        # 获取视频信息（JSON格式）- 使用转换后的cookies
        echo "获取视频元数据..."
        yt-dlp --cookies cookies_netscape.txt --dump-json "$VIDEO_URL" > output/video_metadata.json 2>&1 || {
          echo "获取元数据失败，输出错误信息:"
          cat output/video_metadata.json
          echo "尝试不使用cookies..."
          yt-dlp --dump-json "$VIDEO_URL" > output/video_metadata.json
        }
        
        # 检查是否成功获取元数据
        if [ ! -s "output/video_metadata.json" ] || grep -q "ERROR" output/video_metadata.json; then
          echo "警告: 无法获取视频元数据，cookies可能已过期"
          echo "尝试继续处理..."
          echo '{"title": "Unknown Video", "id": "fN9uYWCjQaw"}' > output/video_metadata.json
        fi
        
        # 获取视频标题（用于文件名）
        VIDEO_TITLE=$(cat output/video_metadata.json | jq -r '.title' 2>/dev/null || echo "YouTube_Video")
        VIDEO_TITLE=$(echo "$VIDEO_TITLE" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c1-50)
        echo "video_title=$VIDEO_TITLE" >> $GITHUB_OUTPUT
        
        # 方法1：生成简单的M3U播放列表
        echo "生成播放列表..."
        echo "#EXTM3U" > output/playlist.m3u
        echo "#EXTINF:-1, YouTube Video" >> output/playlist.m3u
        
        # 尝试获取最佳视频流 - 使用转换后的cookies
        echo "尝试获取最佳视频流..."
        STREAMS=$(yt-dlp --cookies cookies_netscape.txt -g -f best "$VIDEO_URL" 2>/dev/null)
        
        if [ -n "$STREAMS" ]; then
          # 如果有多个流（视频和音频分离），合并它们
          STREAM_COUNT=$(echo "$STREAMS" | wc -l)
          if [ "$STREAM_COUNT" -gt 1 ]; then
            echo "# 检测到多个流，尝试合并..." > output/stream_info.txt
            VIDEO_STREAM=$(echo "$STREAMS" | head -1)
            AUDIO_STREAM=$(echo "$STREAMS" | tail -1)
            echo "视频流: $VIDEO_STREAM" >> output/stream_info.txt
            echo "音频流: $AUDIO_STREAM" >> output/stream_info.txt
            echo "$VIDEO_STREAM" >> output/playlist.m3u
          else
            echo "$STREAMS" >> output/playlist.m3u
          fi
          echo "✓ 成功获取视频流"
        else
          echo "✗ 无法获取视频流，尝试备用方法..."
          # 备用方法：获取所有可用格式
          yt-dlp --cookies cookies_netscape.txt -F "$VIDEO_URL" > output/available_formats.txt 2>&1 || true
          echo "尝试不使用cookies获取流..."
          STREAMS=$(yt-dlp -g -f best "$VIDEO_URL" 2>/dev/null)
          if [ -n "$STREAMS" ]; then
            echo "$STREAMS" >> output/playlist.m3u
            echo "✓ 成功获取视频流（无cookies）"
          else
            echo "# 无法获取视频流，请检查URL或网络连接" >> output/playlist.m3u
          fi
        fi
        
        # 方法2：生成详细格式列表
        echo "生成格式列表..."
        echo "# 可用格式列表" > output/formats.m3u
        echo "# 生成时间: $(date)" >> output/formats.m3u
        
        # 获取并解析格式信息 - 使用转换后的cookies
        yt-dlp --cookies cookies_netscape.txt -F "$VIDEO_URL" 2>/dev/null | grep -E "^(ID|^[0-9]+)" | while read line; do
          if [[ "$line" == ID* ]]; then
            continue  # 跳过标题行
          fi
          
          FORMAT_ID=$(echo $line | awk '{print $1}')
          EXTENSION=$(echo $line | awk '{print $2}')
          RESOLUTION=$(echo $line | awk '{print $3}')
          FPS=$(echo $line | awk '{print $4}')
          FILESIZE=$(echo $line | awk '{print $5}')
          TBR=$(echo $line | awk '{print $6}')
          PROTOCOL=$(echo $line | awk '{print $7}')
          VCODEC=$(echo $line | awk '{print $8}')
          ACODEC=$(echo $line | awk '{print $9}')
          
          # 尝试获取该格式的流URL - 使用转换后的cookies
          echo "正在获取格式 $FORMAT_ID 的流URL..."
          STREAM_URL=$(yt-dlp --cookies cookies_netscape.txt --simulate --get-url -f "$FORMAT_ID" "$VIDEO_URL" 2>/dev/null | head -1)
          
          if [ -n "$STREAM_URL" ] && [[ "$STREAM_URL" == http* ]]; then
            echo "#EXTINF:-1, Format $FORMAT_ID: $EXTENSION $RESOLUTION $VCODEC/$ACODEC" >> output/formats.m3u
            echo "$STREAM_URL" >> output/formats.m3u
            echo "✓ 格式 $FORMAT_ID 可用"
          fi
        done
        
        # 如果formats.m3u为空，尝试不使用cookies
        if [ ! -s "output/formats.m3u" ] || [ $(wc -l < output/formats.m3u) -le 2 ]; then
          echo "formats.m3u为空，尝试不使用cookies..."
          yt-dlp -F "$VIDEO_URL" 2>/dev/null | grep -E "^(ID|^[0-9]+)" | while read line; do
            if [[ "$line" == ID* ]]; then
              continue
            fi
            
            FORMAT_ID=$(echo $line | awk '{print $1}')
            EXTENSION=$(echo $line | awk '{print $2}')
            RESOLUTION=$(echo $line | awk '{print $3}')
            FPS=$(echo $line | awk '{print $4}')
            VCODEC=$(echo $line | awk '{print $8}')
            ACODEC=$(echo $line | awk '{print $9}')
            
            echo "#EXTINF:-1, Format $FORMAT_ID: $EXTENSION $RESOLUTION $VCODEC/$ACODEC" >> output/formats.m3u
            echo "# 需要cookies才能获取URL" >> output/formats.m3u
          done
        fi
        
        # 方法3：生成JSON格式的流信息
        echo "生成JSON格式的流信息..."
        echo '{"streams": [], "metadata": {}}' > output/streams.json
        
        # 获取所有可用的直接流URL - 使用转换后的cookies
        echo "获取所有可用的流URL..."
        yt-dlp --cookies cookies_netscape.txt --flat-playlist --get-url --format "best" "$VIDEO_URL" > output/direct_urls.txt 2>/dev/null || true
        
        echo "解析完成！"
        echo "结束时间: $(date)"

    - name: Create summary report
      run: |
        echo "# 视频流生成报告" > output/report.md
        echo "" >> output/report.md
        echo "## 基本信息" >> output/report.md
        echo "- 视频URL: https://m.youtube.com/watch?v=fN9uYWCjQaw" >> output/report.md
        echo "- 生成时间: $(date)" >> output/report.md
        echo "- GitHub Actions Run: https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >> output/report.md
        echo "- Cookies使用: 已转换并尝试使用" >> output/report.md
        echo "" >> output/report.md
        
        if [ -f output/playlist.m3u ]; then
          echo "## 生成的播放列表" >> output/report.md
          echo "### playlist.m3u 内容:" >> output/report.md
          echo '```m3u' >> output/report.md
          cat output/playlist.m3u >> output/report.md
          echo '```' >> output/report.md
          echo "" >> output/report.md
        fi
        
        if [ -f output/formats.m3u ]; then
          FORMAT_COUNT=$(grep -c "#EXTINF" output/formats.m3u)
          echo "### 可用格式数量: $FORMAT_COUNT" >> output/report.md
        fi
        
        if [ -f output/direct_urls.txt ] && [ -s output/direct_urls.txt ]; then
          echo "## 直接流URL" >> output/report.md
          echo '```' >> output/report.md
          head -5 output/direct_urls.txt >> output/report.md
          echo '```' >> output/report.md
        fi
        
        if [ -f output/video_metadata.json ]; then
          echo "## 视频信息" >> output/report.md
          echo "- 标题: $(cat output/video_metadata.json | jq -r '.title' 2>/dev/null || echo '无法获取')" >> output/report.md
          echo "- 时长: $(cat output/video_metadata.json | jq -r '.duration_string' 2>/dev/null || echo '无法获取')" >> output/report.md
          echo "- 上传者: $(cat output/video_metadata.json | jq -r '.uploader' 2>/dev/null || echo '无法获取')" >> output/report.md
        fi
        
        echo "" >> output/report.md
        echo "## 状态报告" >> output/report.md
        if [ -f output/stream_info.txt ]; then
          echo "### 流信息" >> output/report.md
          echo '```' >> output/report.md
          cat output/stream_info.txt >> output/report.md
          echo '```' >> output/report.md
        fi
        
        if [ -f output/available_formats.txt ]; then
          echo "### 可用格式" >> output/report.md
          echo '```' >> output/report.md
          head -20 output/available_formats.txt >> output/report.md
          echo '```' >> output/report.md
        fi
        
        echo "" >> output/report.md
        echo "## 使用方法" >> output/report.md
        echo "1. 下载 artifacts 中的文件" >> output/report.md
        echo "2. 使用支持 M3U 的播放器打开 playlist.m3u" >> output/report.md
        echo "3. 或者使用 formats.m3u 选择不同质量的流" >> output/report.md
        echo "" >> output/report.md
        echo "## 注意事项" >> output/report.md
        echo "- YouTube 视频流可能需要有效的 cookies 才能访问" >> output/report.md
        echo "- 如果无法播放，请检查 cookies 是否已过期" >> output/report.md

    - name: Upload generated files
      uses: actions/upload-artifact@v4
      with:
        name: video-stream-sources
        path: |
          output/
          cookies_netscape.txt
        retention-days: 7
        if-no-files-found: warn

    - name: Display completion message
      if: always()
      run: |
        echo "=== 工作流执行完成 ==="
        echo "生成的文件已上传到 Artifacts"
        echo "名称: video-stream-sources"
        echo ""
        echo "包含的文件:"
        find output/ -type f -name "*.*" | while read file; do
          echo "- $(basename "$file")"
        done
        echo "- cookies_netscape.txt"
