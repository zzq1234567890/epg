name: Run yt-dlp for YouTube Live Parsing and Download
# 觸發事件：推送至 main 分支，或每小時排程運行一次（可調整）
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'  # 每小時一次（UTC 時間）

jobs:
  parse-and-download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3  # 使用最新 yt-dlp 安裝 action

      - name: Prepare cookies if needed
        if: ${{ secrets.YOUTUBE_COOKIES }}  # 只在有 Secrets 時執行
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
          # 驗證 cookie 檔案（選用）
          cat cookies.txt

      - name: Run yt-dlp to extract HLS and download sample
        run: |
          # 更新 yt-dlp 到最新版（應對 YouTube 變化）
          yt-dlp -U
          
          # 定義基本命令
          YT_DLP_CMD="yt-dlp"
          
          # 如果有 cookie 檔案，添加 --cookies 選項
          if [ -f cookies.txt ]; then
            YT_DLP_CMD="$YT_DLP_CMD --cookies cookies.txt"
          fi
          
          # 提取 HLS m3u8 URL（包含最高品質 variant）
          $YT_DLP_CMD --get-url -f best "https://www.youtube.com/watch?v=fN9uYWCjQaw" > live_hls_urls.txt
          
          # 下載直播樣本（前 5 分鐘，避免無限下載；-f best 選最高品質）
          $YT_DLP_CMD --download-sections "*0-300" --force-keyframes-at-cuts -f best -o "youtube_live_sample.%(ext)s" "https://www.youtube.com/watch?v=fN9uYWCjQaw"
          
          # （選用）如果想下載完整直播，從頭開始：$YT_DLP_CMD --live-from-start -f best -o "full_live.%(ext)s" "https://www.youtube.com/watch?v=fN9uYWCjQaw"
          # 注意：完整下載可能因直播持續而超時，建議用在短直播或手動觸發

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: yt-dlp-results
          path: |
            live_hls_urls.txt
            youtube_live_sample.*
